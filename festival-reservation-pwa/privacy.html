<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>개인정보 안내</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:720px;margin:0 auto;padding:32px 20px;line-height:1.7;color:#202236}h1{font-size:25px}h2{margin-top:28px;font-size:18px}a{color:#5b4bff}</style></head><body><h1>개인정보 처리 안내</h1><p>이 시제품은 입력된 이름, 학번, 예약 정보를 현재 사용 중인 기기의 브라우저 저장공간에만 보관합니다. 별도의 온라인 서버로 전송하지 않습니다.</p><h2>실제 축제 운영 전 변경 사항</h2><p>여러 학생이 함께 사용하는 정식 버전에서는 학교가 승인한 서버와 데이터베이스를 연결하고, 수집 목적·보관 기간·삭제 방법·관리 책임자를 명확하게 안내해야 합니다.</p><h2>시제품 데이터 삭제</h2><p>앱의 운영자 메뉴에서 모든 예약 데이터를 초기화하거나 브라우저 사이트 데이터를 삭제할 수 있습니다.</p><p><a href="index.html">앱으로 돌아가기</a></p></body></html>
